<!DOCTYPE html>
<html>

  {% include head.html %}

  <body>

    <div class="site-container">

      <!-- ========== Left Sidebar ========== -->
      <nav class="site-sidebar" id="site-sidebar" aria-label="Site navigation">
        <div class="sidenav-header">
          <a href="{{ site.baseurl }}/">
            <img src="{{ '/_images/logo.png' | prepend: site.baseurl }}" alt="{{ site.schoolname }} logo">
            <div class="sidenav-title">
              <span class="sidenav-school">{{ site.schoolname }}</span>
              <span class="sidenav-course-name">{{ site.course_name }}</span>
              <span class="sidenav-sem">{{ site.course_semester }}</span>
            </div>
          </a>
        </div>

        {% include sidenav.html %}
      </nav>

      <!-- ========== Main Content ========== -->
      <div class="site-main" id="site-main">

        <!-- Slim top bar (hamburger on mobile, course name for context) -->
        <div class="site-topbar">
          <button class="sidebar-toggle-btn" id="sidebar-toggle" aria-label="Toggle navigation">
            <svg viewBox="0 0 18 15" width="18" height="15" aria-hidden="true">
              <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.031C17.335,0,18,0.665,18,1.484L18,1.484z"/>
              <path d="M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0c0-0.82,0.665-1.484,1.484-1.484 h15.031C17.335,6.031,18,6.696,18,7.516L18,7.516z"/>
              <path d="M18,13.516C18,14.335,17.335,15,16.516,15H1.484C0.665,15,0,14.335,0,13.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.031C17.335,12.031,18,12.696,18,13.516L18,13.516z"/>
            </svg>
          </button>
          <a class="topbar-brand" href="{{ site.baseurl }}/">{{ site.course_name }}</a>
        </div>

        <!-- Page content -->
        <div class="page-content">
          <div class="wrapper">
            {{ content }}
          </div>
        </div>

        {% include footer.html %}

      </div><!-- /.site-main -->

    </div><!-- /.site-container -->

    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script>
      // Sidebar toggle for mobile
      (function () {
        var toggle  = document.getElementById('sidebar-toggle');
        var sidebar = document.getElementById('site-sidebar');
        var overlay = document.getElementById('sidebar-overlay');

        function openSidebar() {
          sidebar.classList.add('sidebar-open');
          overlay.classList.add('overlay-visible');
          document.body.style.overflow = 'hidden';
        }
        function closeSidebar() {
          sidebar.classList.remove('sidebar-open');
          overlay.classList.remove('overlay-visible');
          document.body.style.overflow = '';
        }
        function toggleSidebar() {
          if (sidebar.classList.contains('sidebar-open')) { closeSidebar(); }
          else { openSidebar(); }
        }

        if (toggle)  toggle.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', closeSidebar);
      })();

      // Open external links in new tab
      document.querySelectorAll('a[href]').forEach(function(link) {
        var href = link.getAttribute('href');
        if (href && (href.startsWith('http://') || href.startsWith('https://'))) {
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }
      });
    </script>

  </body>

</html>
