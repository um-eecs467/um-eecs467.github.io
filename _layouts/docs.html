---
layout: default
---

<div class="docs-page">
  {% if page.title %}
  <header class="docs-page-header">
    <h1>{{ page.title }}</h1>
    {% if page.last_modified_at %}
    <p class="docs-last-modified">Last updated: {{ page.last_modified_at | date: "%B %d, %Y" }}</p>
    {% endif %}
  </header>
  {% endif %}

  <div class="docs-page-content">
    {{ content }}
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll(".docs-page div.highlight").forEach(function (block) {
    var btn = document.createElement("button");
    btn.className = "copy-code-btn";
    btn.setAttribute("aria-label", "Copy code");
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

    block.style.position = "relative";
    block.appendChild(btn);

    btn.addEventListener("click", function () {
      var code = block.querySelector("code");
      if (!code) return;
      navigator.clipboard.writeText(code.innerText).then(function () {
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        btn.classList.add("copied");
        setTimeout(function () {
          btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
          btn.classList.remove("copied");
        }, 2000);
      });
    });
  });
});
</script>
